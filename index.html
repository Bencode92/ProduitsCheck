<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StructBoard — Produits Structurés</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%233B82F6'/><text x='16' y='22' text-anchor='middle' fill='white' font-size='18' font-weight='bold'>S</text></svg>">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body>

  <!-- Topbar -->
  <div class="topbar">
    <div class="topbar-brand">
      <div class="topbar-logo">S</div>
      <div class="topbar-title">Struct<span>Board</span></div>
    </div>
    <div class="topbar-actions">
      <div class="topbar-status" id="connection-status">
        <span class="dot-live"></span>
        <span>Connecté</span>
      </div>
      <button class="btn sm ghost" onclick="location.reload()">↻</button>
      <button class="btn sm danger" onclick="github.logout(); location.reload()">Déconnexion</button>
    </div>
  </div>

  <!-- Main Content -->
  <div class="main" id="main-content">
    <div class="loading-screen">
      <div class="spinner"></div>
      <div style="color:var(--text-muted); font-size:13px">Chargement de StructBoard...</div>
    </div>
  </div>

  <!-- Token Modal -->
  <div id="token-modal">
    <div class="token-modal-box">
      <h2>🔐 Token GitHub requis</h2>
      <p>Nécessaire pour sauvegarder vos données. Token en session uniquement — jamais stocké.</p>
      <div class="form-field" style="margin-bottom:16px">
        <input type="password" id="token-input" placeholder="ghp_xxxxxxxxxxxx" 
          onkeydown="if(event.key==='Enter') document.getElementById('token-btn').click()">
      </div>
      <button class="btn primary lg" id="token-btn" style="width:100%" onclick="handleTokenSubmit()">
        Valider
      </button>
    </div>
  </div>

  <!-- Modal Container -->
  <div id="modal"></div>

  <!-- Toast Container -->
  <div id="toast-container"></div>

  <!-- Scripts -->
  <script src="js/config.js"></script>
  <script src="js/github.js"></script>
  <script src="js/pdf.js"></script>
  <script src="js/scoring.js"></script>
  <script src="js/app.js"></script>
  <script src="js/ui.js"></script>

  <script>
    // ─── Initialisation ─────────────────────────────────────
    async function handleTokenSubmit() {
      const input = document.getElementById('token-input');
      const btn = document.getElementById('token-btn');
      if (!input.value.trim()) return;

      btn.disabled = true;
      btn.textContent = 'Vérification...';

      const valid = await app.validateAndSetToken(input.value.trim());

      btn.disabled = false;
      btn.textContent = 'Valider';

      if (!valid) {
        input.value = '';
        input.focus();
      }
    }

    // Boot
    document.addEventListener('DOMContentLoaded', () => {
      app.init();
    });
  </script>

</body>
</html>
