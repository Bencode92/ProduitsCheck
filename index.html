<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StructBoard — Produits Structurés & CAT</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%233B82F6'/><text x='16' y='22' text-anchor='middle' fill='white' font-size='18' font-weight='bold'>S</text></svg>">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/cat.css">
  <link rel="stylesheet" href="css/fiche.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>
  <div class="topbar">
    <div class="topbar-brand">
      <div class="topbar-logo">S</div>
      <div class="topbar-title">Struct<span>Board</span></div>
    </div>
    <div class="topbar-nav" id="main-nav">
      <button class="nav-tab active" data-view="dashboard" onclick="switchMainView('dashboard')">Produits Structurés</button>
      <button class="nav-tab" data-view="cat" onclick="switchMainView('cat')">Comptes à Terme</button>
      <button class="nav-tab" data-view="analytics" onclick="switchMainView('analytics')">📊 Analytique</button>
    </div>
    <div class="topbar-actions">
      <div class="topbar-status"><span class="dot-live"></span><span>Connecté</span></div>
      <button class="btn sm ghost" onclick="location.reload()">↻</button>
    </div>
  </div>
  <div class="main" id="main-content">
    <div class="loading-screen"><div class="spinner"></div><div style="color:var(--text-muted);font-size:13px">Chargement...</div></div>
  </div>
  <div id="modal"></div>
  <div id="toast-container"></div>
  <script src="js/config.js"></script>
  <script src="js/github.js"></script>
  <script src="js/pdf.js"></script>
  <script src="js/scoring.js"></script>
  <script src="js/cat.js"></script>
  <script src="js/cat-ai.js"></script>
  <script src="js/app.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/tracking.js"></script>
  <script src="js/archive.js"></script>
  <script src="js/proposal-ai.js"></script>
  <script src="js/ui-patches.js"></script>
  <script src="js/cat-patches.js"></script>
  <script src="js/proposal-patches.js"></script>
  <script src="js/analytics.js"></script>
  <script>
    function switchMainView(view) {
      document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
      document.querySelector(`.nav-tab[data-view="${view}"]`).classList.add('active');
      if (view === 'cat') { app.setState({ view: 'cat' }); renderCAT(document.getElementById('main-content')); }
      else if (view === 'analytics') { app.setState({ view: 'analytics' }); renderAnalytics(document.getElementById('main-content')); }
      else { app.goToDashboard(); }
    }
    document.addEventListener('DOMContentLoaded', async () => { await app.init(); await loadCATAIConversation(); });
  </script>
</body>
</html>
